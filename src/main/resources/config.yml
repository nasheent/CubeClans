    title: "&8Clan Menu"
    size: 45
    items:
    # First menú "create clan"
      create-clan:
        slot: 22
        material: EMERALD
        name: "&aCreate Clan"
        lore:
          - "&fCreate a new clan"
          - ""
          - "&cClick to create!"
    # Second menú "After creating clan"
      clan-details:
        slot: 20
        material: BOOK
        name: "&bClan Details"
        lore:
          - "&fOpen detailed clan info"
          - "&fMembers, color & stats"
          - ""
          - "&cClick to open!"
      clan-list:
        slot: 22
        material: DIAMOND
        name: "&eClan List"
        lore:
          - "&fView top clans by KDR"
          - ""
          - "&cClick to view!"
      player-stats:
