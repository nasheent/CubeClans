# Database Settings
database:
  # Database type: SQLITE or MYSQL
  type: SQLITE
  
  # MySQL/MariaDB settings (only used if type is MYSQL)
  mysql:
    host: localhost
    port: 3306
    database: cubeclans
    username: root
    password: password
    # HikariCP pool settings (optimized for performance)
    pool:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000

# General Settings
settings:
  # Minimum length for clan names
  min-clan-name-length: 3
  # Maximum length for clan names
  max-clan-name-length: 16
  # Maximum number of members per clan
  max-clan-members: 10
  # Maximum number of allies per clan
  max-clan-allies: 3
  # Maximum number of enemies per clan
  max-clan-enemies: 5
  # Allow clan names with spaces
  allow-spaces-in-names: false
  # Allow color codes in clan names
  allow-colors-in-names: true
  # Cooldown for color changes in seconds
  color-change-cooldown: 3
  # Save data interval (in ticks, 20 ticks = 1 second)
  auto-save-interval: 6000
  # Cost to create a clan (set to -1 for free)
  clan-creation-cost: 300

# Placeholder defaults when a player has no clan
placeholders:
  no-clan-name: "[none]"
  no-clan-name-color: "&7[none]"
  # Colors used by %cube_playername% and %rel_cube_playername%
  # enemy = target is enemy clan
  # ally = target is allied clan
  # member = target is same clan
  # neutral = no relation or no clan
  playername-colors:
    enemy: "&c"
    ally: "&b"
    member: "&a"
    neutral: "&e"

# Menu Configuration
# Here you can use #RRGGGBB hex color codes in item names and lores for more customization!
